{% extends "base.html" %}
{% block content %}
<div style="text-align:center; padding: 4rem 2rem;">
    <div style="font-size:4rem; margin-bottom:1rem;">🔒</div>
    <h1 style="font-size:1.5rem; color:#2c3e50; margin-bottom:0.5rem;">Accès refusé</h1>
    <p style="color:#999; margin-bottom:2rem;">Cette page nécessite un mot de passe.</p>
    <form method="get" action="/dev" style="display:flex; justify-content:center; gap:0.5rem;">
        <input type="password" name="pwd" placeholder="Mot de passe" autofocus
               style="padding:0.6rem 1rem; border:2px solid #ddd; border-radius:6px; font-size:1rem;">
        <button type="submit" class="btn btn-primary">Entrer</button>
    </form>
</div>
{% endblock %}
